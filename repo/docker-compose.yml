services:
  app:
    build:
      context: .
      target: production
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    profiles:
      - dev

  test:
    build:
      context: .
      target: test
    environment:
      - NODE_ENV=test
    profiles:
      - test
